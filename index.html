<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup Page</title>
<link rel="stylesheet" href="style.css">


</head>
<body>

<div class="container">

    <input type="radio" name="tab" id="login" checked>
    <input type="radio" name="tab" id="signup">

    <div class="tabs">
        <label for="login" class="login-tab">Login</label>
        <label for="signup" class="signup-tab">Signup</label>
    </div>

    <!-- Login Form -->
    <div class="form login-form">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email" required id="linp">
            <input type="password" placeholder="Password" required id="linp">
            <button type="submit" id="lbtn">Login</button>
        </form>
    </div>

    <!-- Signup Form -->
    <div class="form signup-form">
        <h2>Create Account</h2>
        <form>
            
            <input type="email" placeholder="Email" required id="sinp">
            <input type="password" placeholder="Password" required id="spas">
        
            <button type="submit" id="sbtn">Signup</button>
        </form>
    </div>

</div>

</body>
</html>
